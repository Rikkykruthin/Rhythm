<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scanner - Jam Nights</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0c18;
            color: #f5efe0;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #f4c34a; }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1c2e;
            color: #f5efe0;
        }
        button {
            background: #f4c34a;
            color: #0a0c18;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #ffd97a;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
        }
        .valid {
            background: rgba(60,200,120,0.2);
            border: 2px solid rgba(60,200,120,0.6);
            color: #7ef0a8;
        }
        .invalid {
            background: rgba(240,80,80,0.2);
            border: 2px solid rgba(240,80,80,0.6);
            color: #ff9a9a;
        }
        .warn {
            background: rgba(244,195,74,0.2);
            border: 2px solid #f4c34a;
            color: #ffd97a;
        }
        .info {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }
        pre {
            background: #1a1c2e;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🎫 Test Scanner</h1>
    <p>Manually test ticket scanning without camera</p>

    <div class="form-group">
        <label>Admin PIN:</label>
        <input type="password" id="pin" value="230526" placeholder="Enter PIN">
    </div>

    <div class="form-group">
        <label>Ticket ID:</label>
        <input type="text" id="ticketId" value="LJ-2K7YGJ" placeholder="Enter Ticket ID (e.g., LJ-2K7YGJ)">
    </div>

    <button onclick="scanTicket()">🔍 Scan Ticket</button>

    <div id="result"></div>

    <script>
        async function scanTicket() {
            const pin = document.getElementById('pin').value;
            const ticketId = document.getElementById('ticketId').value.trim();
            const resultEl = document.getElementById('result');

            if (!pin) {
                alert('Please enter PIN');
                return;
            }

            if (!ticketId) {
                alert('Please enter Ticket ID');
                return;
            }

            resultEl.innerHTML = '<div class="result warn"><h2>Checking...</h2></div>';

            try {
                const response = await fetch('http://localhost:8082/scan-ticket', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ticket_id: ticketId,
                        pin: pin
                    })
                });

                const data = await response.json();
                console.log('Response:', data);

                let html = '';

                if (response.status === 403) {
                    html = `
                        <div class="result invalid">
                            <h2>❌ UNAUTHORIZED</h2>
                            <p>Incorrect PIN</p>
                        </div>
                    `;
                } else if (!data.found) {
                    html = `
                        <div class="result invalid">
                            <h2>❌ INVALID</h2>
                            <p>Ticket not found</p>
                        </div>
                    `;
                } else if (data.previous_status === 'used') {
                    html = `
                        <div class="result warn">
                            <h2>⚠️ ALREADY USED</h2>
                            <p><strong>${data.name}</strong> · ${data.qty} pax</p>
                            <div class="info">Scanned at: ${new Date(data.scanned_at).toLocaleString()}</div>
                        </div>
                    `;
                } else if (data.previous_status === 'cancelled') {
                    html = `
                        <div class="result invalid">
                            <h2>❌ CANCELLED</h2>
                            <p>${data.name}</p>
                        </div>
                    `;
                } else if (data.previous_status === 'paid') {
                    html = `
                        <div class="result valid">
                            <h2>✅ VALID - ENTRY GRANTED</h2>
                            <p><strong>${data.name}</strong> · ${data.qty} pax</p>
                            <div class="info">Scanned at: ${new Date(data.scanned_at).toLocaleString()}</div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="result invalid">
                            <h2>❌ INVALID</h2>
                            <p>Status: ${data.previous_status}</p>
                        </div>
                    `;
                }

                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                resultEl.innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                resultEl.innerHTML = `
                    <div class="result invalid">
                        <h2>❌ ERROR</h2>
                        <p>${error.message}</p>
                        <div class="info">Check if backend is running on port 8082</div>
                    </div>
                `;
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                scanTicket();
            }
        });
    </script>
</body>
</html>
